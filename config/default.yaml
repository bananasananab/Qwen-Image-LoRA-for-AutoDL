job: "extension"
config:
  name: "qwen-image-lora-default"
  process:
    - type: "diffusion_trainer"
      training_folder: "/root/autodl-tmp/output"
      sqlite_db_path: "/root/autodl-tmp/ai-toolkit/aitk_db.db"
      device: "cuda"
      trigger_word: "触发词"
      performance_log_every: 10
      network:
        type: "lora"
        # LoRA rank presets: low=8, medium=16 (default), high=32.
        # Set linear/linear_alpha/conv/conv_alpha to the same chosen value.
        linear: 16
        linear_alpha: 16
        conv: 16
        conv_alpha: 16
        lokr_full_rank: true
        lokr_factor: -1
        network_kwargs:
          ignore_if_contains: []
      save:
        dtype: "bf16"
        save_every: 250
        max_step_saves_to_keep: 5
        save_format: "safetensors"
        push_to_hub: false
      datasets:
        - folder_path: "/root/autodl-tmp/ai-toolkit/datasets/default"
          mask_path: null
          mask_min_value: 0.1
          default_caption: ""
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          cache_latents_to_disk: true
          is_reg: false
          network_weight: 1
          resolution:
            - 1024
          controls: []
          shrink_video_to_frames: true
          num_frames: 1
          flip_x: false
          flip_y: false
          num_repeats: 1
          control_path_1: null
          control_path_2: null
          control_path_3: null
      train:
        batch_size: 1
        bypass_guidance_embedding: false
        steps: 3000
        gradient_accumulation: 4
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        timestep_type: "weighted"
        content_or_style: "balanced"
        optimizer_params:
          weight_decay: 0.0001
        unload_text_encoder: true
        cache_text_embeddings: true
        lr: 0.0001
        ema_config:
          use_ema: true
          ema_decay: 0.99
        skip_first_sample: false
        force_first_sample: false
        disable_sampling: false
        dtype: "bf16"
        diff_output_preservation: false
        diff_output_preservation_multiplier: 1
        diff_output_preservation_class: "person"
        switch_boundary_every: 1
        loss_type: "mse"
      logging:
        log_every: 1
        use_ui_logger: true
      model:
        # Transformer/diffusion model. The default matches the original AutoDL fp8 file.
        name_or_path: "/root/autodl-tmp/models/qwen_image_2512_fp8_e4m3fn.safetensors"
        # Tokenizer/text encoder/VAE can be changed independently.
        # Set *_subfolder to null when pointing directly at a component folder.
        tokenizer_name_or_path: "Qwen/Qwen-Image"
        tokenizer_subfolder: "tokenizer"
        text_encoder_name_or_path: "Qwen/Qwen-Image"
        text_encoder_subfolder: "text_encoder"
        vae_name_or_path: "Qwen/Qwen-Image"
        vae_subfolder: "vae"
        quantize: false
        quantize_te: false
        arch: "qwen_image"
        low_vram: false
        device_map: "cuda"
        model_kwargs:
          match_target_res: false
        layer_offloading: false
        layer_offloading_text_encoder_percent: 1
        layer_offloading_transformer_percent: 1
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        samples:
          - prompt: "[trigger], portrait illustration, clean composition, soft natural light, detailed eyes, refined color palette"
          - prompt: "[trigger], full body character design, dynamic pose, crisp linework, elegant clothing, white background"
          - prompt: "[trigger], cinematic scene in a quiet city street at night, rain reflections, shallow depth of field"
          - prompt: "[trigger], watercolor style fantasy garden, delicate flowers, airy atmosphere, bright morning light"
          - prompt: "[trigger], product poster composition, bold silhouette, studio lighting, high detail"
          - prompt: "a cozy reading corner by a window, warm sunlight, plants, soft blanket, peaceful mood"
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 3.5
        sample_steps: 30
        num_frames: 1
        fps: 1
meta:
  name: "[name]"
  version: "1.0"
